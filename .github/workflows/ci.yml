name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Cross-compile check (all release targets)
        run: |
          for target in "windows amd64" "windows arm64" "linux amd64" "linux arm64" "darwin amd64" "darwin arm64"; do
            set -- $target
            echo "build $1/$2"
            GOOS=$1 GOARCH=$2 go build -o /dev/null ./cmd/centauri
          done

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: SDK tests (mock server, zero deps)
        working-directory: sdk/python
        run: python -m unittest discover -s tests -v
