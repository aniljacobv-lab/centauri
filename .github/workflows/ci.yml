name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual run from the Actions tab

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Test (race detector)
        # The race detector isn't available on windows/arm64, so this Linux/amd64
        # job is the canonical place it runs — covering the group-commit committer
        # and other concurrent paths.
        run: go test -race ./...
      - name: Cross-compile check (all release targets)
        run: |
          for target in "windows amd64" "windows arm64" "linux amd64" "linux arm64" "darwin amd64" "darwin arm64"; do
            set -- $target
            echo "build $1/$2"
            GOOS=$1 GOARCH=$2 go build -o /dev/null ./cmd/centauri
          done

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: SDK tests (mock server, zero deps)
        working-directory: sdk/python
        run: python -m unittest discover -s tests -v

  zero-deps:
    name: Zero Go dependencies (invariant 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert go.mod has no require block
        run: |
          if grep -nE '^\s*require' go.mod; then
            echo "::error::go.mod has a require directive — the zero-dependency invariant is broken."
            exit 1
          fi
          echo "ok: go.mod declares no third-party dependencies"
