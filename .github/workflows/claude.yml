# The automated contributor: comment "@claude" on an issue or PR and
# Claude implements it and opens a pull request. CI (ci.yml) gates the
# result; a human always merges.
#
# One-time setup (see CONTRIBUTING.md):
#   1. Run `claude` locally and use /install-github-app on this repo, OR
#      install https://github.com/apps/claude manually.
#   2. Add the ANTHROPIC_API_KEY secret (repo Settings → Secrets → Actions).
name: Claude
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only react to @claude mentions, and only from people with push access
    # (so random drive-by comments can't spend your API budget).
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Project conventions live in CLAUDE.md at the repo root;
          # Claude reads it automatically.
