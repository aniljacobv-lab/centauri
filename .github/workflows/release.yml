name: Release

# Fires when you push a version tag, e.g.:
#   git tag v0.3.0 && git push origin v0.3.0
# Builds all 6 binaries + the Windows installer + checksums, then publishes
# them on the matching GitHub Release. The download page and install.sh
# point at these artifacts.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required to create the release

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build all release targets
        env:
          CGO_ENABLED: "0"          # stdlib-only: pure-Go cross-compile, no cgo
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for target in "linux amd64" "linux arm64" "darwin amd64" "darwin arm64" "windows amd64" "windows arm64"; do
            set -- $target
            os=$1; arch=$2
            out="dist/centauri-${TAG}-${os}-${arch}"
            [ "$os" = "windows" ] && out="${out}.exe"
            echo "build $os/$arch -> $out"
            GOOS=$os GOARCH=$arch go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/centauri
          done
          ls -l dist
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*

  installer:
    needs: binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Sync installer version to the tag
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"     # v0.3.0 -> 0.3.0
          sed -i "s/#define MyAppVersion .*/#define MyAppVersion \"$VER\"/" installer/centauri.iss
          grep MyAppVersion installer/centauri.iss
      - name: Build Windows installer
        shell: cmd
        run: '"%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" installer\centauri.iss'
      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/centauri-*-windows-setup.exe

  release:
    needs: [binaries, installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: installer
          path: dist
      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum centauri-* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "Centauri $GITHUB_REF_NAME" \
            --generate-notes
